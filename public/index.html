<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>site2rag</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#111827">
<link rel="stylesheet" href="/tailwind.css?v=5">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(reg => {
    reg.addEventListener('updatefound', () => {
      reg.installing.addEventListener('statechange', function() {
        if (this.state === 'activated') location.reload();
      });
    });
    setInterval(() => reg.update().catch(() => {}), 30000);
  });
}
</script>
<style>
  :root{color-scheme:light}
  [x-cloak]{display:none!important}
  body{font-family:ui-sans-serif,system-ui,sans-serif}
  .mono{font-family:ui-monospace,monospace}

  /* Thumbnail */
  .thumb{width:72px;height:96px;object-fit:cover;object-position:top;background:#f3f4f6;flex-shrink:0;border-radius:3px;
    box-shadow:0 1px 3px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.06);}
  .thumb-placeholder{display:flex;align-items:center;justify-content:center;color:#9ca3af;font-size:1.5rem;
    width:72px;height:96px;flex-shrink:0;border-radius:3px;background:#f3f4f6;
    box-shadow:0 1px 3px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.06);}

  /* Score block */
  .score-block{display:flex;flex-direction:column;align-items:center;justify-content:center;
    width:72px;flex-shrink:0;border-radius:6px;padding:6px 4px;}
  .score-num{font-family:ui-monospace,monospace;font-weight:900;font-size:2rem;line-height:1;letter-spacing:-.03em}
  .score-sub{font-size:.6rem;font-weight:600;text-align:center;margin-top:3px;line-height:1.2}

  /* Pills */
  .score-pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.72rem;font-family:ui-monospace,monospace;font-weight:700;letter-spacing:.02em}
  .status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;flex-shrink:0}
  @keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(59,130,246,.5)}70%{box-shadow:0 0 0 6px rgba(59,130,246,0)}100%{box-shadow:0 0 0 0 rgba(59,130,246,0)}}
  .processing-pulse{animation:pulse-ring 1.5s ease-out infinite}

  /* Progress bars */
  .prog-bar{height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden}
  .prog-fill{height:100%;border-radius:3px;transition:width .4s}
  .seg-bar{height:10px;border-radius:4px;overflow:hidden;display:flex;background:#e5e7eb}
  .seg-fill{height:100%;transition:width .4s;flex-shrink:0}
  .seg-fill-rest{height:100%;transition:flex .4s;flex:1}

  /* Site tabs */
  .site-tab{display:flex;flex-direction:column;padding:12px 18px;border-bottom:3px solid transparent;color:#6b7280;transition:all .15s;border-radius:0;min-width:200px;text-align:left;background:transparent}
  .site-tab.active{color:#111827;border-bottom-color:#111827;background:#fff}
  .site-tab:hover:not(.active){color:#374151;border-bottom-color:#d1d5db;background:#f9fafb}

  /* PDF tabs */
  .tab-btn{padding:6px 14px;font-size:.8rem;font-weight:600;border-bottom:2px solid transparent;color:#6b7280;transition:all .15s}
  .tab-btn.active{color:#111827;border-bottom-color:#111827}
  .tab-btn:hover:not(.active){color:#374151;border-bottom-color:#d1d5db}
</style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen" x-data="app()" x-cloak>

<div class="max-w-7xl mx-auto px-4 py-4">

  <!-- Header -->
  <div class="flex items-center justify-between mb-4">
    <div class="flex items-center gap-3">
      <h1 class="text-base font-bold tracking-tight mono" x-text="'site2rag'+(appVersion?' v'+appVersion:'')">site2rag</h1>
      <span class="text-xs text-gray-400">archival mirror &amp; PDF upgrade monitor</span>
    </div>
    <div class="flex items-center gap-3 text-xs text-gray-400 mono">
      <span x-text="lastRefresh ? 'updated '+lastRefresh : ''"></span>
      <template x-if="serverHealth">
        <span class="flex items-center gap-1.5 px-2 py-0.5 rounded cursor-pointer hover:opacity-80"
              :class="serverHealth.ok ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'"
              :title="serverHealth.ok ? 'API OK · '+serverHealth.uptime_seconds+'s uptime · '+serverHealth.mem_mb+'MB' : serverHealth.sites?.filter(s=>!s.ok).map(s=>s.domain+': '+s.error).join('; ')"
              @click="showHealthDetail=!showHealthDetail">
          <span class="status-dot" :class="serverHealth.ok ? 'bg-green-400' : 'bg-red-400'"></span>
          <span x-text="serverHealth.ok ? 'API healthy' : 'API errors'"></span>
          <span class="not-mono text-gray-400" x-text="serverHealth.mem_mb+'MB · '+fmtUptime(serverHealth.uptime_seconds)"></span>
        </span>
      </template>
      <template x-if="!serverHealth">
        <span class="px-2 py-0.5 rounded"
              :class="apiStatus==='connected'?'bg-green-100 text-green-700':'bg-red-100 text-red-600'"
              x-text="apiStatus"></span>
      </template>
      <button @click="showUpgradeInfo=true"
              class="flex items-center gap-1 text-gray-400 hover:text-gray-600 transition-colors">
        <span class="text-sm leading-none">ⓘ</span><span class="not-mono font-medium">about upgrades</span>
      </button>
    </div>
  </div>

  <template x-if="apiError">
    <div class="bg-red-50 border border-red-200 rounded p-3 text-sm text-red-700 mb-4">
      <strong>API error:</strong> <span x-text="apiError"></span>
    </div>
  </template>

  <!-- Site tabs — domain + status + key counts + spidering bar -->
  <template x-if="sites.length">
    <div class="bg-gray-50 border border-b-0 border-gray-200 rounded-t-xl shadow-sm overflow-x-auto mb-0">
      <div class="flex divide-x divide-gray-200">
        <template x-for="s in sites" :key="s.domain">
          <button @click="selectSite(s)" class="site-tab flex-1"
            :class="activeSite?.domain===s.domain ? 'active' : ''">

            <!-- Domain + status + run badge -->
            <div class="flex items-center gap-2 mb-1.5">
              <span class="status-dot flex-shrink-0"
                :class="s.last_run?.status==='running'?'bg-blue-400 processing-pulse':s.last_run?.status==='failed'?'bg-red-400':'bg-gray-300'"></span>
              <span class="mono font-bold text-sm" x-text="s.domain"></span>
              <span class="text-xs px-1.5 py-0.5 rounded-full font-semibold ml-auto shrink-0" :class="runBadgeCls(s)" x-text="runBadge(s)"></span>
            </div>

            <!-- Key counts -->
            <div class="flex gap-3 text-xs mb-2">
              <span><span class="font-bold mono" x-text="fmt(s.total_pages)"></span><span class="text-gray-400 ml-0.5">pg</span></span>
              <span><span class="font-bold mono" x-text="fmt(s.total_pdfs)"></span><span class="text-gray-400 ml-0.5">PDF</span></span>
              <span><span class="font-bold mono text-green-600" x-text="fmt(s.upgraded)"></span><span class="text-gray-400 ml-0.5">↑</span></span>
              <template x-if="s.processing">
                <span><span class="font-bold mono text-blue-500 processing-pulse inline-block" x-text="fmt(s.processing)"></span><span class="text-gray-400 ml-0.5">ocr</span></span>
              </template>
            </div>

            <!-- Spidering progress bar -->
            <div class="flex justify-between text-xs mb-0.5">
              <span :class="s.mirror_progress ? 'text-blue-500 font-medium' : 'text-gray-400'">spidering</span>
              <span class="mono" :class="s.mirror_progress ? 'text-blue-500' : 'text-gray-400'"
                x-text="s.mirror_progress ? fmt(crawlDisplay[s.domain]||s.mirror_progress.checked)+'/'+fmt(s.total_pages) : (s.total_pages ? 'done' : '—')"></span>
            </div>
            <div class="prog-bar" style="height:4px">
              <div class="prog-fill"
                :style="'width:'+(s.mirror_progress ? Math.round((crawlDisplay[s.domain]||s.mirror_progress.checked)/Math.max(s.total_pages,1)*100) : siteProgressPct(s,'pages'))+'%'"
                :class="s.mirror_progress ? 'bg-blue-400 processing-pulse' : 'bg-gray-400'"></div>
            </div>

          </button>
        </template>
      </div>
    </div>
  </template>

  <!-- Active site detail panel — single column, full width -->
  <template x-if="activeSite">
    <div class="bg-white border border-gray-200 shadow-sm px-5 py-4 mb-4 rounded-b-xl space-y-3">

      <!-- Domain + run status + key counts -->
      <div class="flex items-center gap-3 flex-wrap">
        <a :href="activeSite.url" target="_blank" rel="noopener"
           class="font-bold mono text-base hover:text-blue-600 hover:underline" x-text="activeSite.domain"></a>
        <span class="text-xs px-2 py-0.5 rounded-full font-semibold" :class="runBadgeCls(activeSite)" x-text="runBadge(activeSite)"></span>
        <span class="text-xs text-gray-400 mono" x-text="lastRunAgo(activeSite)"></span>
        <div class="flex gap-4 text-xs ml-2 flex-wrap">
          <div><span class="font-bold mono text-gray-800" x-text="fmt(activeSite.total_pages)"></span><span class="text-gray-400 ml-1">pages</span></div>
          <div><span class="font-bold mono text-gray-700" x-text="fmt(activeSite.total_pdfs)"></span><span class="text-gray-400 ml-1">PDFs</span></div>
          <div><span class="font-bold mono text-amber-600" x-text="fmt(activeSite.pending)"></span><span class="text-gray-400 ml-1">queued</span></div>
          <template x-if="activeSite.processing">
            <div><span class="font-bold mono text-blue-500 processing-pulse inline-block" x-text="fmt(activeSite.processing)"></span><span class="text-gray-400 ml-1">processing</span></div>
          </template>
          <div><span class="font-bold mono text-green-600" x-text="fmt(activeSite.upgraded)"></span><span class="text-gray-400 ml-1">upgraded</span></div>
          <div class="pl-3 border-l border-gray-200">
            <span class="mono font-medium" :class="(activeSite.total_cost_usd||0) > 10 ? 'text-amber-600' : 'text-gray-500'"
                  x-text="activeSite.total_cost_usd ? '$'+(activeSite.total_cost_usd < 0.01 ? activeSite.total_cost_usd.toFixed(4) : activeSite.total_cost_usd.toFixed(2)) : '$0'"></span>
            <span class="text-gray-400 ml-1">API cost</span>
          </div>
        </div>
      </div>

      <template x-if="activeSite.last_run?.status==='failed' && activeSite.last_run?.message">
        <div class="text-xs text-red-500 truncate" :title="activeSite.last_run.message" x-text="'⚠ '+activeSite.last_run.message"></div>
      </template>

      <!-- Spidering -->
      <div>
        <div class="flex justify-between text-xs mb-1">
          <span class="text-gray-500 font-medium">spidering</span>
          <span class="mono text-gray-500" x-text="activeSite.mirror_progress ? fmt(crawlDisplay[activeSite.domain]||activeSite.mirror_progress.checked)+' / '+fmt(activeSite.total_pages)+' pages' : (activeSite.total_pages ? fmt(activeSite.total_pages)+' pages complete' : 'not started')"></span>
        </div>
        <div class="prog-bar" style="height:8px">
          <div class="prog-fill" :style="'width:'+(activeSite.mirror_progress ? Math.round((crawlDisplay[activeSite.domain]||activeSite.mirror_progress.checked)/Math.max(activeSite.total_pages,1)*100) : siteProgressPct(activeSite,'pages'))+'%'"
               :class="activeSite.mirror_progress ? 'bg-blue-400 processing-pulse' : 'bg-gray-400'"></div>
        </div>
      </div>

      <!-- Summarizing -->
      <template x-if="activeSite.scored > 0">
        <div>
          <div class="flex justify-between text-xs mb-1">
            <span class="text-gray-500 font-medium">summarizing</span>
            <span class="mono text-gray-500" x-text="fmt(sumDisplay[activeSite.domain]||activeSite.image_pdfs_summarized||0)+' / '+fmt(activeSite.image_pdfs)+' image PDFs'"></span>
          </div>
          <div class="prog-bar" style="height:6px">
            <div class="prog-fill bg-violet-400" :style="'width:'+Math.round(((sumDisplay[activeSite.domain]||activeSite.image_pdfs_summarized||0)/Math.max(activeSite.image_pdfs,1))*100)+'%'"></div>
          </div>
        </div>
      </template>

      <!-- PDF upgrade segmented bar -->
      <div>
        <div class="flex justify-between text-xs mb-1">
          <span class="text-gray-500 font-medium">PDF upgrade</span>
          <span class="mono text-gray-500" x-text="upgradeProgressLabel(activeSite)"></span>
        </div>
        <div class="seg-bar" style="height:8px">
          <div class="seg-fill bg-blue-200" :style="'width:'+upgradeSegPct(activeSite,'ok')+'%'" :title="fmt(activeSite.already_ok||0)+' already readable'"></div>
          <div class="seg-fill bg-green-400" :style="'width:'+upgradeSegPct(activeSite,'done')+'%'" :title="fmt(activeSite.upgraded)+' upgraded'"></div>
          <div class="seg-fill-rest bg-red-300" :title="fmt((activeSite.pending||0)+(activeSite.failed||0)+(activeSite.processing||0))+' need upgrade'"></div>
        </div>
        <div class="flex justify-between text-xs mt-1">
          <span class="text-blue-400" x-text="fmt(activeSite.already_ok||0)+' OK'"></span>
          <span class="text-green-600 font-medium" x-text="fmt(activeSite.upgraded||0)+' upgraded'"></span>
          <span class="text-red-400 font-medium" x-text="fmt((activeSite.pending||0)+(activeSite.failed||0)+(activeSite.processing||0))+' need upgrade'"></span>
        </div>
      </div>

      <!-- Size legend -->
      <div class="pt-2 border-t border-gray-100">
        <div class="flex gap-6 text-xs text-gray-500">
          <div class="flex items-center gap-1.5">
            <span class="w-2.5 h-2.5 rounded-sm bg-gray-300 inline-block flex-shrink-0"></span>
            <span>Mirror</span>
            <span class="mono font-semibold text-gray-700" x-text="fmtBytes(activeSite.mirror_size_bytes)"></span>
          </div>
          <div class="flex items-center gap-1.5">
            <span class="w-2.5 h-2.5 rounded-sm bg-blue-200 inline-block flex-shrink-0"></span>
            <span>Markdown</span>
            <span class="mono font-semibold text-gray-700" x-text="fmtBytes(activeSite.md_size_bytes)"></span>
          </div>
          <div class="flex items-center gap-1.5 ml-auto">
            <span class="text-gray-400">total</span>
            <span class="mono font-semibold text-gray-700" x-text="fmtBytes((activeSite.mirror_size_bytes||0)+(activeSite.md_size_bytes||0))"></span>
          </div>
        </div>
        <div class="text-xs text-gray-400 mono mt-1 truncate" x-text="activeSite.md_dir||'—'"></div>
      </div>
    </div>
  </template>

  <!-- PDF browser -->
  <template x-if="activeSite">
    <div>
      <!-- Section header -->
      <h3 class="text-sm font-semibold text-gray-500 mb-3">PDF Assets</h3>

      <!-- Tabs -->
      <div class="flex items-end border-b border-gray-200 mb-4 gap-0">
        <button class="tab-btn" :class="activeTab==='failed'?'active':''" @click="switchTab('failed')">
          Poor Quality
          <span class="ml-1.5 text-xs mono font-normal" :class="activeTab==='failed'?'text-red-400':'text-gray-400'"
            x-text="'('+fmt(tabTotals.failed ?? ((selectedSiteData()?.total_pdfs||0)-(selectedSiteData()?.already_ok||0)-(selectedSiteData()?.upgraded||0)))+')'"></span>
        </button>
        <button class="tab-btn" :class="activeTab==='adequate'?'active':''" @click="switchTab('adequate')">
          Adequate
          <span class="ml-1.5 text-xs mono font-normal" :class="activeTab==='adequate'?'text-blue-400':'text-gray-400'"
            x-text="'('+fmt(tabTotals.adequate ?? (selectedSiteData()?.already_ok||0))+')'"></span>
        </button>
        <button class="tab-btn" :class="activeTab==='upgraded'?'active':''" @click="switchTab('upgraded')">
          Upgraded
          <span class="ml-1.5 text-xs mono font-normal" :class="activeTab==='upgraded'?'text-green-500':'text-gray-400'"
            x-text="'('+fmt(tabTotals.upgraded ?? (selectedSiteData()?.upgraded||0))+')'"></span>
        </button>
      </div>

      <!-- About upgrade popup -->
      <template x-if="showUpgradeInfo">
        <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50"
             @click.self="showUpgradeInfo=false" @keydown.escape.window="showUpgradeInfo=false">
          <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full p-6">
            <div class="flex items-start justify-between mb-4">
              <h2 class="text-lg font-bold text-gray-900">What the PDF Upgrade Does</h2>
              <button @click="showUpgradeInfo=false" class="text-gray-300 hover:text-gray-600 text-2xl leading-none ml-4">×</button>
            </div>
            <p class="text-sm text-gray-600 mb-4">Image-only PDFs (scanned documents) contain no machine-readable text — just pictures of pages. The upgrade pipeline runs a two-stage AI process to transform them into proper archival documents.</p>

            <div class="bg-gray-50 rounded-lg p-3 mb-4 text-xs text-gray-600 space-y-1.5">
              <div class="font-semibold text-gray-700 text-sm mb-2">Two-stage upgrade pipeline</div>
              <div class="flex gap-2"><span class="font-medium text-gray-700 w-5 shrink-0">1.</span><div><strong>Vision AI transcription</strong> — Each page is rasterized at high resolution and sent to a local vision language model (LLaVA). The model reads the page as a human would, outputting structured Markdown that preserves headings, paragraphs, lists, and tables — far more context-aware than traditional character-recognition OCR.</div></div>
              <div class="flex gap-2"><span class="font-medium text-gray-700 w-5 shrink-0">2.</span><div><strong>OCRmyPDF PDF/A rebuild</strong> — The transcribed text is embedded as an invisible layer using OCRmyPDF (ISO 19005-3 compliant), which also deskews pages, corrects rotation, and cleans scan artifacts. If OCRmyPDF is unavailable the pdf-lib fallback uses the vision AI text directly.</div></div>
              <div class="flex gap-2"><span class="font-medium text-gray-700 w-5 shrink-0">3.</span><div><strong>Metadata enrichment</strong> — Claude Haiku analyzes the hosting page and document excerpt to infer title, author, and a one-sentence description. These are embedded as standard PDF document properties (/Title, /Author, /Subject, /Keywords) readable by any PDF viewer or cataloging tool.</div></div>
            </div>

            <div class="font-semibold text-gray-700 text-sm mb-2">What gets added to every upgraded PDF</div>
            <ul class="space-y-2 text-sm">
              <li class="flex gap-3"><span class="shrink-0">📄</span><div><strong class="text-gray-800">Searchable text layer</strong> — invisibly overlaid on each page; document looks identical but is fully searchable and copy-pasteable.</div></li>
              <li class="flex gap-3"><span class="shrink-0">📋</span><div><strong class="text-gray-800">Embedded metadata</strong> — title, author, subject, keywords, and source URL baked into PDF document properties.</div></li>
              <li class="flex gap-3"><span class="shrink-0">🗄</span><div><strong class="text-gray-800">PDF/A-3 archival standard</strong> (ISO 19005-3) — fonts embedded, no external dependencies, self-contained and renderer-independent for decades-long preservation.</div></li>
              <li class="flex gap-3"><span class="shrink-0">♿</span><div><strong class="text-gray-800">Accessibility</strong> — screen readers, translation tools, and assistive technology can read the content.</div></li>
              <li class="flex gap-3"><span class="shrink-0">🔍</span><div><strong class="text-gray-800">Full-text indexable</strong> — search engines, RAG pipelines, and institutional repositories can extract content without manual work.</div></li>
              <li class="flex gap-3"><span class="shrink-0">🔗</span><div><strong class="text-gray-800">Provenance</strong> — original URL and processing date embedded as keywords; document origin permanently recorded.</div></li>
            </ul>
            <p class="text-xs text-gray-400 mt-4 border-t border-gray-100 pt-3">Upgraded PDFs are drop-in replacements — original filename, compatible with all standard PDF viewers. Site owners can replace files one by one or batch-rsync the entire upgraded set.</p>
          </div>
        </div>
      </template>

      <!-- Filter bar -->
      <div class="bg-white border border-gray-200 rounded-lg px-4 py-3 mb-4 flex flex-wrap gap-3 items-end shadow-sm">
        <div>
          <label class="block text-xs text-gray-400 mb-1">Search</label>
          <input type="search" x-model="filters.q" @input="debouncedSearch()"
            placeholder="title, URL or text…"
            class="border border-gray-200 rounded px-3 py-1.5 text-sm w-52 focus:outline-none focus:ring-1 focus:ring-gray-400">
        </div>
        <template x-if="activeTab==='failed'">
          <div>
            <label class="block text-xs text-gray-400 mb-1">Status</label>
            <select x-model="filters.status" @change="loadDocs()"
              class="border border-gray-200 rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-gray-400">
              <option value="">All</option>
              <option value="pending">Queued</option>
              <option value="processing">Processing</option>
              <option value="failed">Failed</option>
              <option value="unscored">Unscored</option>
            </select>
          </div>
        </template>
        <div>
          <label class="block text-xs text-gray-400 mb-1">Max score</label>
          <div class="flex items-center gap-1.5">
            <input type="range" x-model="filters.score_max" min="0" max="1" step="0.05" @change="loadDocs()"
              class="w-20 accent-gray-700">
            <span class="text-xs mono text-gray-500 w-8" x-text="'≤'+Number(filters.score_max).toFixed(2)"></span>
          </div>
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">Sort</label>
          <select x-model="filters.sort" @change="loadDocs()"
            class="border border-gray-200 rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-gray-400">
            <template x-if="activeTab==='failed'">
              <option value="score_asc">Worst first</option>
            </template>
            <option value="score_desc">Best first</option>
            <option value="pages_desc">Most pages</option>
            <option value="title_asc">Title A–Z</option>
            <template x-if="activeTab==='upgraded'">
              <option value="improved_desc">Most improved</option>
            </template>
          </select>
        </div>
      </div>

      <template x-if="loading && !docs.length">
        <div class="text-center py-12 text-gray-400 text-sm">Loading…</div>
      </template>

      <template x-if="!loading || docs.length">
        <div>
          <!-- Top pagination -->
          <template x-if="docsPages > 1">
            <div class="flex items-center justify-between text-sm mb-3">
              <button @click="goPage(docsPage-1)" :disabled="docsPage<=1"
                class="px-4 py-2 border border-gray-300 rounded-lg bg-white disabled:opacity-30 hover:bg-gray-50">← Prev</button>
              <span class="text-gray-500 mono text-xs" x-text="'Page '+docsPage+' of '+docsPages+' ('+fmt(docsTotal)+' total)'"></span>
              <button @click="goPage(docsPage+1)" :disabled="docsPage>=docsPages"
                class="px-4 py-2 border border-gray-300 rounded-lg bg-white disabled:opacity-30 hover:bg-gray-50">Next →</button>
            </div>
          </template>

          <!-- Doc rows -->
          <div class="space-y-2 mb-4">
            <template x-for="doc in docs" :key="doc.url">
              <div class="border rounded-xl p-3 flex gap-3 shadow-sm hover:shadow-md transition-shadow cursor-pointer"
                   @click="openDetail(doc)"
                   :class="[
                     doc.skip ? 'opacity-40' : '',
                     doc.status==='processing' ? 'bg-green-50 border-green-200 ring-1 ring-green-300' :
                     activeTab==='upgraded'     ? 'bg-green-50 border-green-200' :
                     activeTab==='adequate'     ? 'bg-blue-50 border-blue-200' :
                     doc.status==='failed'      ? 'bg-red-50 border-red-200' :
                                                  'bg-white border-gray-200'
                   ]">

                <!-- Thumbnail -->
                <div class="shrink-0 self-start mt-0.5">
                  <img :src="thumbSrc(doc)" :alt="docTitle(doc)"
                       class="thumb hover:opacity-80 transition-opacity"
                       onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                  <div class="thumb-placeholder" style="display:none">📄</div>
                </div>

                <!-- Score block -->
                <div class="score-block shrink-0 self-start mt-0.5" :class="scoreBlockCls(doc)">
                  <template x-if="doc.composite_score!=null">
                    <div class="score-num" x-text="Math.round(doc.composite_score*100)+'%'"></div>
                  </template>
                  <template x-if="doc.composite_score==null">
                    <div class="score-num text-gray-300">—</div>
                  </template>
                  <div class="score-sub" x-text="scoreLabel(doc).label"></div>
                </div>

                <!-- Main content -->
                <div class="flex-1 min-w-0">
                  <!-- Title row -->
                  <div class="flex items-start gap-2 mb-0.5">
                    <a :href="pdfSrc(doc)" target="_blank" rel="noopener" @click.stop
                       class="font-semibold text-sm text-gray-900 hover:text-blue-600 leading-snug line-clamp-2 flex-1"
                       x-text="docTitle(doc)"></a>
                    <!-- Status badge -->
                    <template x-if="doc.status==='processing'">
                      <span class="shrink-0 flex items-center gap-1 text-xs font-semibold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full">
                        <span class="status-dot bg-blue-500 processing-pulse"></span>processing
                      </span>
                    </template>
                    <template x-if="doc.status==='failed'">
                      <span class="shrink-0 text-xs font-semibold text-red-600 bg-red-50 px-2 py-0.5 rounded-full" title="Upgrade failed">✗ failed</span>
                    </template>
                    <template x-if="doc.status==='pending'">
                      <span class="shrink-0 text-xs text-amber-600 bg-amber-50 px-2 py-0.5 rounded-full">◷ queued</span>
                    </template>
                    <template x-if="activeTab==='upgraded' && doc.status==='done'">
                      <span class="shrink-0 text-xs font-semibold text-green-700 bg-green-50 px-2 py-0.5 rounded-full">✓ upgraded</span>
                    </template>
                  </div>

                  <!-- Author -->
                  <template x-if="doc.ai_author && doc.ai_author !== 'Unknown'">
                    <div class="text-xs text-gray-500 mb-0.5 italic" x-text="doc.ai_author"></div>
                  </template>

                  <!-- Summary (free tier shows italic, haiku shows normal) -->
                  <template x-if="doc.ai_summary">
                    <p class="text-xs leading-relaxed line-clamp-2 mb-1"
                       :class="doc.summary_tier==='haiku' ? 'text-gray-600' : 'text-gray-500 italic'"
                       x-text="doc.ai_summary"></p>
                  </template>

                  <!-- Upgraded tab: full improvement panel -->
                  <template x-if="activeTab==='upgraded' && doc.status==='done'">
                    <div class="mt-1 mb-1 space-y-1.5">
                      <!-- Before → After scores -->
                      <template x-if="doc.after_score!=null">
                        <div class="flex items-center gap-2 flex-wrap">
                          <template x-if="doc.score_improvement">
                            <span class="text-base font-bold text-green-600 mono" x-text="'+'+Math.round(doc.score_improvement*100)+'pts improvement'"></span>
                          </template>
                          <template x-if="doc.before_score!=null">
                            <span class="score-pill" :class="scorePillCls(doc.before_score)" x-text="Math.round(doc.before_score*100)+'%'"></span>
                          </template>
                          <template x-if="doc.before_score!=null">
                            <span class="text-gray-400 text-xs">→</span>
                          </template>
                          <span class="score-pill bg-green-100 text-green-800 font-bold" x-text="Math.round(doc.after_score*100)+'%'"></span>
                          <template x-if="doc.pages_processed">
                            <span class="text-xs text-gray-400 mono" x-text="'· '+fmt(doc.pages_processed)+' pages OCR\'d'"></span>
                          </template>
                          <template x-if="doc.method">
                            <span class="text-xs text-gray-400 mono" x-text="'via '+doc.method"></span>
                          </template>
                        </div>
                      </template>
                      <!-- Archival improvements -->
                      <div class="flex flex-wrap gap-1.5 text-xs">
                        <span class="bg-green-100 text-green-700 px-1.5 py-0.5 rounded font-medium" title="ISO 32000 compliant text layer added">📄 Searchable text</span>
                        <span class="bg-green-100 text-green-700 px-1.5 py-0.5 rounded font-medium" title="Content extractable independently of PDF viewer">🗄 Long-term preservation</span>
                        <span class="bg-green-100 text-green-700 px-1.5 py-0.5 rounded font-medium" title="Screen readers and assistive tools can read the text layer">♿ Accessibility (PDF/UA basis)</span>
                        <span class="bg-green-100 text-green-700 px-1.5 py-0.5 rounded font-medium" title="Text can be indexed, searched, and extracted by any tool">🔍 Full-text indexable</span>
                      </div>
                    </div>
                  </template>

                  <!-- Impossible to upgrade indicator -->
                  <template x-if="cannotUpgrade(doc)">
                    <div class="text-xs rounded px-2 py-0.5 inline-block mb-1"
                         :class="doc.pages === 0 ? 'text-gray-400 bg-gray-50' : 'text-green-600 bg-green-50'">
                      <span x-text="doc.pages === 0 ? '⚠ Empty document' : '✓ Already readable — no upgrade needed'"></span>
                    </div>
                  </template>

                  <!-- Metadata row -->
                  <div class="flex items-center gap-3 text-xs text-gray-400 flex-wrap mt-1">
                    <span x-show="doc.pages" class="mono font-medium text-gray-500" x-text="fmt(doc.pages)+' pp'"></span>
                    <template x-if="doc.lang_key && doc.lang_key !== 'english'">
                      <span class="px-1.5 py-0.5 rounded font-medium"
                            :class="langBadgeCls(doc)"
                            :title="doc.lang_key==='unknown' ? 'Language undetected — deprioritized in queue' : doc.ai_language"
                            x-text="doc.lang_key==='unknown' ? '?' : doc.ai_language"></span>
                    </template>
                    <template x-if="effortEstimate(doc) && activeTab==='failed'">
                      <span :class="(doc.lang_key && doc.lang_key !== 'english' && doc.lang_key !== 'unknown') ? 'text-amber-600 font-bold' : 'text-amber-600 font-medium'"
                            x-text="effortEstimate(doc)"></span>
                    </template>
                    <template x-if="doc.readable_pages_pct!=null">
                      <span x-text="Math.round(doc.readable_pages_pct*100)+'% readable'"></span>
                    </template>
                    <a x-show="doc.source_url" :href="doc.source_url" target="_blank" rel="noopener" @click.stop
                       class="hover:text-blue-500 truncate max-w-xs"
                       x-text="'↗ '+(doc.source_url||'').replace(/^https?:\/\//,'').split('/')[0]"></a>
                    <template x-if="activeTab==='upgraded' && doc.upgraded_pdf_path">
                      <a :href="`${API_BASE}/api/docs/download?site=${activeSite.domain}&url=${encodeURIComponent(doc.url)}`"
                         @click.stop class="font-semibold text-green-700 hover:underline ml-auto">↓ upgraded PDF</a>
                    </template>
                    <!-- Skip toggle (failed tab) -->
                    <template x-if="activeTab==='failed'">
                      <button @click.stop="toggleSkip(doc)"
                              class="ml-auto px-2 py-0.5 rounded border text-xs transition-colors"
                              :class="doc.skip ? 'border-amber-300 text-amber-700 bg-amber-50' : 'border-gray-200 text-gray-300 hover:text-amber-600 hover:border-amber-300'"
                              x-text="doc.skip ? '⊘ skipped' : 'skip'"></button>
                    </template>
                  </div>

                  <!-- Error (failed docs) -->
                  <template x-if="doc.error && doc.status==='failed'">
                    <div class="text-xs text-red-500 mt-1 truncate" x-text="'Error: '+doc.error"></div>
                  </template>
                </div>
              </div>
            </template>
          </div>

          <!-- Empty state -->
          <template x-if="!loading && !docs.length">
            <div class="text-center py-12 text-gray-400 text-sm bg-white border border-gray-100 rounded-xl">
              <template x-if="activeTab==='failed'">
                <div>No image PDFs needing upgrade match the current filters.</div>
              </template>
              <template x-if="activeTab==='adequate'">
                <div>No adequate PDFs found — PDFs scoring ≥70% appear here.</div>
              </template>
              <template x-if="activeTab==='upgraded'">
                <div>No upgraded PDFs yet. Run the upgrade worker to see results here.</div>
              </template>
            </div>
          </template>

          <!-- Pagination -->
          <template x-if="docsPages > 1">
            <div class="flex items-center justify-between text-sm mt-2">
              <button @click="goPage(docsPage-1)" :disabled="docsPage<=1"
                class="px-4 py-2 border border-gray-300 rounded-lg bg-white disabled:opacity-30 hover:bg-gray-50">← Prev</button>
              <span class="text-gray-500 mono text-xs" x-text="'Page '+docsPage+' of '+docsPages+' ('+fmt(docsTotal)+' total)'"></span>
              <button @click="goPage(docsPage+1)" :disabled="docsPage>=docsPages"
                class="px-4 py-2 border border-gray-300 rounded-lg bg-white disabled:opacity-30 hover:bg-gray-50">Next →</button>
            </div>
          </template>
        </div>
      </template>
    </div>
  </template>
</div>

<!-- PDF detail modal -->
<template x-if="expandedDoc">
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60"
       @click.self="closeDetail()" @keydown.escape.window="closeDetail()">
    <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto overflow-x-hidden">
      <div class="flex gap-5 p-6">
        <div class="shrink-0 flex flex-col gap-1.5">
          <div class="relative flex items-center" style="width:288px">
            <button @click.stop="modalPagePrev()"
                    :disabled="modalPage <= 1"
                    class="absolute left-0 z-10 w-8 h-8 flex items-center justify-center rounded-full bg-black/40 hover:bg-black/60 text-white text-lg leading-none disabled:opacity-20 disabled:cursor-default transition-opacity -translate-x-1/2">‹</button>
            <img :src="thumbSrc(expandedDoc, 800, modalPage, null)" :alt="docTitle(expandedDoc)"
                 class="rounded-lg w-72 cursor-pointer block"
                 style="box-shadow:0 2px 12px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.06)"
                 @click="window.open(pdfSrc(expandedDoc),'_blank')"
                 title="Click to open PDF"
                 onerror="this.style.display='none'">
            <button @click.stop="modalPageNext()"
                    :disabled="modalPage >= (expandedDoc.pages || 1)"
                    class="absolute right-0 z-10 w-8 h-8 flex items-center justify-center rounded-full bg-black/40 hover:bg-black/60 text-white text-lg leading-none disabled:opacity-20 disabled:cursor-default transition-opacity translate-x-1/2">›</button>
          </div>
          <template x-if="(expandedDoc.pages || 0) > 1">
            <div class="text-center text-xs text-gray-400 mono">p.<span x-text="modalPage"></span> / <span x-text="expandedDoc.pages"></span></div>
          </template>
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-start justify-between gap-2 mb-1">
            <h2 class="font-bold text-base leading-snug text-gray-900 flex-1" x-text="docTitle(expandedDoc)"></h2>
            <button @click="closeDetail()" class="text-gray-300 hover:text-gray-600 text-2xl leading-none shrink-0">×</button>
          </div>
          <template x-if="expandedDoc.ai_author && expandedDoc.ai_author !== 'Unknown'">
            <div class="text-sm text-gray-500 italic mb-2" x-text="expandedDoc.ai_author"></div>
          </template>

          <!-- Score display -->
          <div class="flex items-center gap-3 mb-3">
            <div class="score-block" style="width:80px;height:80px" :class="scoreBlockCls(expandedDoc)">
              <div class="score-num text-2xl" x-text="expandedDoc.composite_score!=null ? Math.round(expandedDoc.composite_score*100)+'%' : '—'"></div>
              <div class="score-sub" x-text="scoreLabel(expandedDoc).label"></div>
            </div>
            <div class="text-xs text-gray-500 space-y-1">
              <div x-show="expandedDoc.pages" x-text="fmt(expandedDoc.pages)+' pages'"></div>
              <div x-show="expandedDoc.readable_pages_pct!=null" x-text="Math.round((expandedDoc.readable_pages_pct||0)*100)+'% readable pages'"></div>
              <div x-show="expandedDoc.has_text_layer!=null" x-text="expandedDoc.has_text_layer ? 'Has text layer' : 'No text layer (image PDF)'"></div>
              <template x-if="expandedDoc.ai_language">
                <div class="flex items-center gap-1.5">
                  <span class="px-1.5 py-0.5 rounded font-medium" :class="langBadgeCls(expandedDoc)" x-text="expandedDoc.ai_language"></span>
                  <template x-if="expandedDoc.lang_key && expandedDoc.lang_key !== 'english'">
                    <span class="text-gray-400" x-text="'~'+((LANG_COST_MAP[expandedDoc.lang_key]||1.2)*100|0)+'% cost vs EN'"></span>
                  </template>
                </div>
              </template>
              <div x-show="effortEstimate(expandedDoc)" class="text-amber-600 font-medium" x-text="effortEstimate(expandedDoc)"></div>
              <template x-if="expandedDoc.after_score!=null">
                <div class="flex items-center gap-1.5">
                  <template x-if="expandedDoc.before_score!=null">
                    <span class="score-pill" :class="scorePillCls(expandedDoc.before_score)" x-text="Math.round(expandedDoc.before_score*100)+'%'"></span>
                  </template>
                  <template x-if="expandedDoc.before_score!=null">
                    <span class="text-gray-400">→</span>
                  </template>
                  <span class="score-pill bg-green-100 text-green-800" x-text="Math.round(expandedDoc.after_score*100)+'%'"></span>
                  <span class="text-green-700 font-bold mono text-xs" x-text="expandedDoc.score_improvement ? '+'+Math.round(expandedDoc.score_improvement*100)+'pts' : ''"></span>
                </div>
              </template>
            </div>
          </div>

          <!-- Summary with tier indicator -->
          <template x-if="expandedDoc.ai_summary && !expandedDoc._summarizing">
            <div class="mb-3">
              <p class="text-sm leading-relaxed"
                 :class="expandedDoc.summary_tier==='haiku' ? 'text-gray-700' : 'text-gray-500 italic'"
                 x-text="expandedDoc.ai_summary"></p>
              <div class="flex items-center gap-2 mt-1">
                <template x-if="expandedDoc.ai_language">
                  <span class="text-xs px-1.5 py-0.5 rounded bg-gray-100 text-gray-500 font-medium" x-text="expandedDoc.ai_language"></span>
                </template>
                <template x-if="expandedDoc.summary_tier !== 'haiku'">
                  <span class="text-xs text-blue-400 animate-pulse">✦ enhancing…</span>
                </template>
                <template x-if="expandedDoc.summary_tier === 'haiku'">
                  <span class="text-xs text-gray-300">✦ AI enhanced</span>
                </template>
              </div>
            </div>
          </template>
          <template x-if="expandedDoc._summarizing">
            <div class="mb-3 text-sm text-gray-400 italic animate-pulse">Generating AI summary…</div>
          </template>
          <template x-if="!expandedDoc.ai_summary && !expandedDoc._summarizing && expandedDoc.excerpt">
            <p class="text-sm text-gray-500 leading-relaxed mb-3 italic" x-text="expandedDoc.excerpt"></p>
          </template>

          <!-- Links -->
          <div class="text-xs text-gray-400 space-y-1 mb-4">
            <div class="truncate"><a :href="expandedDoc.url" target="_blank" class="text-blue-600 hover:underline break-all" x-text="expandedDoc.url"></a></div>
            <div x-show="expandedDoc.source_url">
              Found on: <a :href="expandedDoc.source_url" target="_blank" class="text-blue-500 hover:underline"
                          x-text="(expandedDoc.source_url||'').replace(/^https?:\/\//,'')"></a>
            </div>
          </div>

          <!-- Actions -->
          <div class="flex gap-2 flex-wrap">
            <a :href="'/viewer.html?url=' + encodeURIComponent(expandedDoc.url)" target="_blank"
               class="px-3 py-1.5 text-xs rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white font-semibold">📖 Read PDF</a>
            <a :href="expandedDoc.url" target="_blank"
               class="px-3 py-1.5 text-xs rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-semibold">Open PDF ↗</a>
            <a x-show="expandedDoc.archive_url" :href="expandedDoc.archive_url" target="_blank"
               class="px-3 py-1.5 text-xs rounded-lg bg-green-100 hover:bg-green-200 text-green-800 font-semibold">↓ Upgraded PDF</a>
            <template x-if="expandedDoc.status !== 'done'">
              <button @click="toggleSkip(expandedDoc)"
                      class="px-3 py-1.5 text-xs rounded-lg border font-semibold"
                      :class="expandedDoc.skip ? 'border-amber-300 text-amber-700 bg-amber-50' : 'border-gray-200 text-gray-500 hover:text-amber-600'"
                      x-text="expandedDoc.skip ? '⊘ Un-skip' : 'Skip — not worth processing'"></button>
            </template>
          </div>
        </div>
      </div>
    </div>
  </div>
</template>

<script>
const API_BASE = ['localhost','127.0.0.1'].includes(location.hostname)
  ? 'http://127.0.0.1:7840'
  : 'https://api.lnker.com';

const PER_PAGE = 50;

const LANG_COST_MAP = { english:1.0, russian:1.15, unknown:1.2, arabic:1.35, persian:1.35, hebrew:1.35, japanese:1.5, chinese:1.5 };

function fmt(n) {
  if (n == null || n === '') return '0';
  return Number(n).toLocaleString();
}

function fmtBytes(b) {
  if (!b) return '0 B';
  const units = ['B','KB','MB','GB','TB'];
  let i = 0; let v = b;
  while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
  return (i === 0 ? v : v.toFixed(1)) + ' ' + units[i];
}

function scorePillCls(s) {
  if (s == null) return 'bg-gray-100 text-gray-400';
  if (s >= 0.85) return 'bg-green-100 text-green-800';
  if (s >= 0.65) return 'bg-blue-100 text-blue-700';
  if (s >= 0.45) return 'bg-yellow-100 text-yellow-700';
  if (s >= 0.25) return 'bg-orange-100 text-orange-700';
  return 'bg-red-100 text-red-700';
}

function scoreBlockCls(doc) {
  const s = doc.composite_score;
  if (s == null) return 'bg-gray-50 text-gray-300';
  if (s >= 0.85) return 'bg-green-50 text-green-700';
  if (s >= 0.65) return 'bg-blue-50 text-blue-700';
  if (s >= 0.45) return 'bg-yellow-50 text-yellow-700';
  if (s >= 0.25) return 'bg-orange-50 text-orange-700';
  return 'bg-red-50 text-red-700';
}

function scoreLabel(doc) {
  const s = doc.composite_score;
  const r = doc.readable_pages_pct;
  const w = doc.word_quality_estimate;
  if (s == null) return { label: 'Not scored', cls: 'text-gray-400' };
  if (doc.skip) return { label: 'Skipped', cls: 'text-amber-600' };
  if (r != null && r < 0.05) return { label: 'No Text Layer', cls: 'text-red-700' };
  if (r != null && r < 0.2 && (w == null || w < 0.5)) return { label: 'Garbage OCR', cls: 'text-red-700' };
  if (r != null && r < 0.3) return { label: 'Mostly Scanned', cls: 'text-orange-700' };
  if (w != null && w < 0.5) return { label: 'Poor OCR', cls: 'text-orange-700' };
  if (s < 0.45) return { label: 'Needs OCR', cls: 'text-yellow-700' };
  if (s < 0.65) return { label: 'Partly Readable', cls: 'text-yellow-700' };
  if (s < 0.85) return { label: 'Mostly Readable', cls: 'text-blue-700' };
  return { label: 'Good Quality', cls: 'text-green-700' };
}

function effortEstimate(doc) {
  const mins = doc.effort_mins;
  if (!mins || mins <= 0) return null;
  if (mins < 60) return `~${mins} min`;
  return `~${Math.round(mins/60)}h`;
}

function langBadgeCls(doc) {
  const k = doc.lang_key || 'unknown';
  if (k === 'unknown') return 'bg-gray-50 text-gray-300 border border-gray-200';
  if (k === 'english') return 'bg-gray-100 text-gray-500';
  if (k === 'russian') return 'bg-blue-50 text-blue-500';
  if (k === 'arabic' || k === 'persian') return 'bg-amber-50 text-amber-600';
  if (k === 'hebrew') return 'bg-purple-50 text-purple-500';
  if (k === 'japanese' || k === 'chinese') return 'bg-rose-50 text-rose-500';
  return 'bg-gray-100 text-gray-400';
}

function cannotUpgrade(doc) {
  if (doc.status === 'done') return false;
  if (doc.has_text_layer && doc.readable_pages_pct != null && doc.readable_pages_pct >= 0.8) return true;
  if (doc.pages === 0) return true;
  return false;
}

function timeAgo(iso) {
  if (!iso) return '';
  const mins = Math.round((Date.now() - new Date(iso)) / 60000);
  if (mins < 2) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.round(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.round(hrs / 24)}d ago`;
}

function app() {
  return {
    sites: [], activeSite: null,
    docs: [],
    docsTotal: 0, docsPage: 1, docsPages: 1,
    tabTotals: { failed: null, adequate: null, upgraded: null },
    filters: { q: '', status: '', score_max: 1, sort: 'score_asc' },
    loading: false, apiStatus: '', apiError: '', lastRefresh: '',
    sumDisplay: {},   // domain -> interpolated summarized count for smooth bar
    _sumRates: {},    // domain -> { value, rate, ts }
    crawlDisplay: {}, // domain -> interpolated crawled count for smooth bar
    _crawlRates: {},  // domain -> { value, rate, ts }
    expandedDoc: null,
    modalPage: 1,
    activeTab: 'failed',
    showUpgradeInfo: false, showHealthDetail: false,
    serverHealth: null,
    appVersion: '', _buildId: null,
    _searchTimer: null,
    fmt, scorePillCls, scoreBlockCls, scoreLabel, effortEstimate, cannotUpgrade, langBadgeCls,

    fmtUptime(s) {
      if (s < 60) return s + 's';
      if (s < 3600) return Math.floor(s / 60) + 'm';
      return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm';
    },

    thumbSrc(doc, w = 144, page = 1, h = 192) {
      const hParam = h ? `&h=${h}` : '';
      return `${API_BASE}/api/thumbnail?url=${encodeURIComponent(doc.url)}&w=${w}${hParam}&page=${page}`;
    },
    pdfSrc(doc) {
      if (doc.upgraded_pdf_path) return `${API_BASE}/api/docs/download?site=${this.activeSite.domain}&url=${encodeURIComponent(doc.url)}`;
      return doc.url;
    },

    openDetail(doc) {
      this.expandedDoc = { ...doc };
      this.modalPage = 1;
      // Auto-trigger deep Haiku summary if not already enhanced
      if (doc.summary_tier !== 'haiku') this.summarize(this.expandedDoc);
    },
    closeDetail() { this.expandedDoc = null; this.modalPage = 1; },
    modalPagePrev() { if (this.modalPage > 1) this.modalPage--; },

    modalPageNext() { if (this.expandedDoc && this.modalPage < (this.expandedDoc.pages || 1)) this.modalPage++; },

    async summarize(doc) {
      if (doc._summarizing) return;
      doc._summarizing = true;
      if (this.expandedDoc?.url === doc.url) this.expandedDoc = { ...doc };
      try {
        const res = await fetch(`${API_BASE}/api/docs/summarize?site=${this.activeSite.domain}&url=${encodeURIComponent(doc.url)}`, { method: 'POST' });
        if (res.ok) {
          const { summary, author, language, tier } = await res.json();
          doc.ai_summary = summary;
          doc.ai_author = author;
          doc.ai_language = language || doc.ai_language;
          doc.summary_tier = tier || 'haiku';
          doc.ai_summarized_at = new Date().toISOString();
          // Sync back to the docs array so card updates too
          const idx = this.docs.findIndex(d => d.url === doc.url);
          if (idx >= 0) Object.assign(this.docs[idx], { ai_summary: doc.ai_summary, ai_author: doc.ai_author, ai_language: doc.ai_language, summary_tier: doc.summary_tier });
          if (this.expandedDoc?.url === doc.url) this.expandedDoc = { ...doc };
        }
      } catch {}
      doc._summarizing = false;
      if (this.expandedDoc?.url === doc.url) this.expandedDoc = { ...doc };
    },

    async toggleSkip(doc) {
      const skip = !doc.skip;
      doc.skip = skip ? 1 : 0;
      if (this.expandedDoc?.url === doc.url) this.expandedDoc = { ...doc };
      await fetch(`${API_BASE}/api/docs/skip?site=${this.activeSite.domain}&url=${encodeURIComponent(doc.url)}&skip=${skip ? 1 : 0}`, { method: 'POST' }).catch(() => {
        doc.skip = skip ? 0 : 1;
      });
    },

    upgradeProgressLabel(s) {
      const total = s.total_pdfs || 0;
      if (!total) return 'no PDFs';
      return `${fmt(s.upgraded||0)} / ${fmt(total)} upgraded`;
    },

    upgradeSegPct(s, type) {
      const total = s.total_pdfs || 1;
      const okPct = (s.already_ok||0) / total * 100;
      // Ensure upgraded segment is always visible (min 1.5%) when any PDFs are upgraded
      const rawDone = (s.upgraded||0) / total * 100;
      const donePct = s.upgraded > 0 ? Math.max(1.5, rawDone) : 0;
      if (type === 'ok') return Math.min(okPct, 100 - donePct).toFixed(2);
      if (type === 'done') return donePct.toFixed(2);
      return 0;
    },

    siteProgressPct(s, type) {
      if (type === 'pages') {
        if (s.last_run?.status === 'running') return 60;
        return s.total_pages > 0 ? 100 : 0;
      }
      if (type === 'scored') return s.total_pdfs ? Math.round((s.scored||0)/s.total_pdfs*100) : 0;
      if (type === 'exported') return s.total_html ? Math.round((s.md_exported||0)/s.total_html*100) : 0;
      return 0;
    },

    async checkVersion() {
      try {
        const r = await fetch('/version.json', { cache: 'no-store' });
        const { build, v } = await r.json();
        if (this._buildId && this._buildId !== build) { location.reload(); return; }
        this._buildId = build;
        this.appVersion = v || '';
      } catch {}
    },

    async init() {
      await this.checkVersion();
      await this.loadSites();
      setInterval(() => this.refresh(), 30000);
      // Smooth interpolation ticker: advance sumDisplay at measured rate between refreshes
      setInterval(() => {
        const now = Date.now();
        for (const [domain, r] of Object.entries(this._sumRates)) {
          const site = this.sites.find(s => s.domain === domain);
          if (!site) continue;
          const elapsed = (now - r.ts) / 1000;
          const est = Math.min(site.image_pdfs || 0, Math.round(r.value + r.rate * elapsed));
          if (est > (this.sumDisplay[domain] || 0)) {
            this.sumDisplay = { ...this.sumDisplay, [domain]: est };
          }
        }
        // Advance crawlDisplay at measured rate between API refreshes
        for (const [domain, r] of Object.entries(this._crawlRates)) {
          const site = this.sites.find(s => s.domain === domain);
          if (!site?.mirror_progress || !r.rate) continue;
          const elapsed = (Date.now() - r.ts) / 1000;
          const est = Math.min(site.total_pages, Math.round(r.value + r.rate * elapsed));
          if (est > (this.crawlDisplay[domain] || 0)) {
            this.crawlDisplay = { ...this.crawlDisplay, [domain]: est };
          }
        }
      }, 500);
    },

    _updateSumRates(newSites) {
      const now = Date.now();
      for (const s of newSites) {
        const prev = this._sumRates[s.domain];
        const newVal = s.image_pdfs_summarized || 0;
        if (prev) {
          const dt = (now - prev.ts) / 1000;
          const observed = dt > 0 ? (newVal - prev.value) / dt : 0;
          const rate = observed > 0 ? observed * 0.4 + prev.rate * 0.6 : prev.rate * 0.7;
          this._sumRates[s.domain] = { value: newVal, rate, ts: now };
        } else {
          this._sumRates[s.domain] = { value: newVal, rate: 0, ts: now };
          this.sumDisplay = { ...this.sumDisplay, [s.domain]: newVal };
        }
      }
    },

    _updateCrawlRates(newSites) {
      const now = Date.now();
      for (const s of newSites) {
        if (!s.mirror_progress) continue;
        const prev = this._crawlRates[s.domain];
        const newVal = s.mirror_progress.checked || 0;
        let rate = prev?.rate || 1; // seed with 1 page/sec so ticker moves immediately
        if (prev && newVal > prev.value) {
          const dt = (now - prev.ts) / 1000;
          const observed = dt > 0 ? (newVal - prev.value) / dt : 0;
          if (observed > 0) rate = observed * 0.4 + rate * 0.6;
        }
        this._crawlRates[s.domain] = { value: newVal, rate, ts: now };
        // Always sync crawlDisplay to at least the real API value
        if (newVal > (this.crawlDisplay[s.domain] || 0)) {
          this.crawlDisplay = { ...this.crawlDisplay, [s.domain]: newVal };
        }
      }
    },

    async loadSites() {
      try {
        const res = await fetch(`${API_BASE}/api/sites`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        this.sites = data.sites || (Array.isArray(data) ? data : []);
        this._updateSumRates(this.sites); this._updateCrawlRates(this.sites);
        this.apiStatus = 'connected'; this.apiError = '';
        if (!this.activeSite && this.sites.length) await this.selectSite(this.sites[0]);
        else if (this.activeSite) {
          const u = this.sites.find(s => s.domain === this.activeSite.domain);
          if (u) this.activeSite = u;
        }
      } catch (e) { this.apiError = e.message; this.apiStatus = 'offline'; }
    },

    async refresh() {
      await this.checkVersion();
      const [sitesRes, healthRes] = await Promise.all([
        fetch(`${API_BASE}/api/sites`, { signal: AbortSignal.timeout(10000) }).catch(() => null),
        fetch(`${API_BASE}/api/health`, { signal: AbortSignal.timeout(5000) }).catch(() => null),
      ]);
      if (healthRes?.ok) this.serverHealth = await healthRes.json().catch(() => null);
      if (!sitesRes?.ok) return;
      const data = await sitesRes.json();
      this.sites = data.sites || (Array.isArray(data) ? data : []);
      this._updateSumRates(this.sites);
      if (this.activeSite) { const u = this.sites.find(s => s.domain === this.activeSite.domain); if (u) this.activeSite = u; }
      this.lastRefresh = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    },

    async selectSite(s) {
      this.activeSite = s;
      this.docsPage = 1;
      this.tabTotals = { failed: null, adequate: null, upgraded: null };
      this.filters = { q: '', status: '', score_max: 1, sort: 'score_asc' };
      await this.loadDocs();
    },

    selectedSiteData() { return this.sites.find(s => s.domain === this.activeSite?.domain); },

    async switchTab(tab) {
      this.activeTab = tab;
      this.docsPage = 1;
      const defaultSort = tab === 'upgraded' ? 'improved_desc' : tab === 'adequate' ? 'score_desc' : 'score_asc';
      this.filters = { q: '', status: '', score_max: 1, sort: defaultSort };
      await this.loadDocs();
    },

    async loadDocs() {
      if (!this.activeSite) return;
      this.loading = true;
      try {
        const p = new URLSearchParams({
          site: this.activeSite.domain,
          page: String(this.docsPage),
          sort: this.filters.sort,
          tab: this.activeTab,
        });
        if (this.filters.q) p.set('q', this.filters.q);
        if (this.filters.status) p.set('status', this.filters.status);
        if (this.filters.score_max < 1) p.set('score_max', String(this.filters.score_max));
        const res = await fetch(`${API_BASE}/api/docs?${p}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        this.docs = data.docs;
        this.docsTotal = data.total;
        this.docsPages = data.pages;
        this.tabTotals = { ...this.tabTotals, [this.activeTab]: data.total };
        this.lastRefresh = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        this.apiError = '';
      } catch (e) { this.apiError = e.message; }
      finally { this.loading = false; }
    },

    debouncedSearch() {
      clearTimeout(this._searchTimer);
      this._searchTimer = setTimeout(() => { this.docsPage = 1; this.loadDocs(); }, 300);
    },

    goPage(n) { this.docsPage = n; this.loadDocs(); },

    docTitle(doc) {
      const decode = s => { try { return decodeURIComponent(s); } catch { return s; } };
      const clean = s => s.replace(/&amp;/g,'&').replace(/&gt;/g,'').replace(/&lt;/g,'').replace(/[<>]+$/,'').trim();
      let title;
      if (doc.title) {
        title = clean(decode(doc.title));
      } else {
        title = clean(decode(doc.url.split('/').pop()).replace(/\.pdf$/i,'').replace(/[_-]/g,' ').trim()) || doc.url;
      }
      // If title looks like a code (no spaces, short, has digits/dots), add source domain for context
      if (title && !title.includes(' ') && title.length < 20 && /[0-9#.]/.test(title) && doc.source_url) {
        const domain = doc.source_url.replace(/^https?:\/\//,'').split('/')[0];
        return `${title} (${domain})`;
      }
      return title;
    },
    runBadge(s) {
      if (!s.last_run) return 'no runs';
      if (s.last_run.status === 'running') return '⟳ running';
      if (s.last_run.status === 'success') return '✓ ok';
      if (s.last_run.status === 'interrupted') return '⊘ stopped';
      return '✗ failed';
    },
    runBadgeCls(s) {
      if (!s.last_run) return 'bg-gray-100 text-gray-400';
      if (s.last_run.status === 'running') return 'bg-blue-100 text-blue-700';
      if (s.last_run.status === 'success') return 'bg-green-100 text-green-700';
      if (s.last_run.status === 'interrupted') return 'bg-gray-100 text-gray-500';
      return 'bg-red-100 text-red-600';
    },
    lastRunAgo(s) {
      if (!s.last_run) return 'never run';
      const ago = timeAgo(s.last_run.started_at);
      if (s.last_run.status === 'running') return `started ${ago}`;
      return `last run ${ago}`;
    }
  };
}
</script>
