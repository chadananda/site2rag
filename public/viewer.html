<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PDF Viewer — site2rag</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#111827">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#374151;font-family:ui-sans-serif,system-ui,sans-serif}

/* Toolbar */
#toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#1f2937;color:#f9fafb;height:52px;flex-shrink:0;user-select:none}
#toolbar button{background:none;border:1px solid #4b5563;color:#e5e7eb;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:4px;white-space:nowrap}
#toolbar button:hover{background:#374151;border-color:#6b7280}
#toolbar button:active{background:#4b5563}
#toolbar button:disabled{opacity:.35;cursor:default}
#toolbar input[type=text]{background:#111827;border:1px solid #4b5563;color:#f9fafb;border-radius:6px;padding:5px 10px;font-size:13px;width:220px;outline:none}
#toolbar input[type=text]:focus{border-color:#6366f1}
#page-info{font-size:13px;color:#9ca3af;white-space:nowrap}
#title-label{font-size:13px;color:#9ca3af;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sep{width:1px;height:24px;background:#374151;flex-shrink:0}

/* Search results count */
#search-count{font-size:12px;color:#9ca3af;white-space:nowrap}

/* Viewport */
#viewport{flex:1;overflow-y:auto;overflow-x:auto;display:flex;flex-direction:column;align-items:center;padding:16px 12px;gap:12px;position:relative}

/* Page canvas wrapper */
.pdf-page{position:relative;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.4);display:inline-block;flex-shrink:0}
.pdf-page canvas{display:block}

/* Text layer */
.textLayer{position:absolute;inset:0;overflow:hidden;pointer-events:auto;line-height:1;opacity:1;cursor:text}
.textLayer span{color:transparent;position:absolute;white-space:pre;cursor:text;transform-origin:0% 0%}
.textLayer ::selection{background:rgba(99,102,241,.3)}
.textLayer .highlight{background:rgba(255,210,0,.5);border-radius:2px}
.textLayer .highlight.selected{background:rgba(255,150,0,.7)}

/* Bookmarks panel */
#bm-panel{position:fixed;right:0;top:52px;bottom:0;width:280px;background:#1f2937;border-left:1px solid #374151;transform:translateX(100%);transition:transform .2s ease;z-index:20;display:flex;flex-direction:column;overflow:hidden}
#bm-panel.open{transform:translateX(0)}
#bm-list{flex:1;overflow-y:auto;padding:8px}
.bm-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;color:#e5e7eb;font-size:13px}
.bm-item:hover{background:#374151}
.bm-item .bm-del{margin-left:auto;color:#6b7280;font-size:16px;line-height:1;padding:2px 4px}
.bm-item .bm-del:hover{color:#ef4444}
.bm-page{font-size:11px;color:#9ca3af;white-space:nowrap}
#bm-empty{padding:16px;color:#6b7280;font-size:13px;text-align:center}

/* Loading */
#loading{position:fixed;inset:0;background:#374151;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#9ca3af;font-size:14px;z-index:50}
#load-bar-wrap{width:240px;height:4px;background:#374151;border-radius:2px;border:1px solid #4b5563;overflow:hidden}
#load-bar{height:100%;background:#6366f1;border-radius:2px;transition:width .15s}
#error-msg{position:fixed;inset:0;background:#374151;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#ef4444;font-size:15px;text-align:center;padding:24px;z-index:50}

/* Fullscreen on tablets */
@media (max-width:768px){
  #toolbar input[type=text]{width:140px}
  #title-label{display:none}
}
</style>
</head>
<body style="display:flex;flex-direction:column;height:100vh">

<div id="loading">
  <div style="font-size:15px">Loading PDF…</div>
  <div id="load-bar-wrap"><div id="load-bar" style="width:0%"></div></div>
  <div id="load-pct">0%</div>
</div>
<div id="error-msg">
  <div style="font-size:2rem">⚠</div>
  <div id="error-text">Failed to load PDF.</div>
  <a href="/" style="color:#9ca3af;font-size:13px">← Back</a>
</div>

<div id="toolbar">
  <button onclick="history.back()" title="Back">←</button>
  <div class="sep"></div>
  <button id="btn-prev" onclick="prevPage()" disabled title="Previous page">‹</button>
  <span id="page-info">— / —</span>
  <button id="btn-next" onclick="nextPage()" disabled title="Next page">›</button>
  <div class="sep"></div>
  <button onclick="zoomOut()" title="Zoom out">−</button>
  <button onclick="zoomIn()" title="Zoom in">+</button>
  <button onclick="zoomFit()" title="Fit to width" style="font-size:11px">Fit</button>
  <div class="sep"></div>
  <input type="text" id="search-box" placeholder="Search…" oninput="onSearchInput()" onkeydown="onSearchKey(event)">
  <button id="btn-prev-hit" onclick="prevHit()" disabled title="Previous match">↑</button>
  <button id="btn-next-hit" onclick="nextHit()" disabled title="Next match">↓</button>
  <span id="search-count"></span>
  <div class="sep"></div>
  <span id="title-label"></span>
  <button id="btn-bm" onclick="toggleBookmarks()" title="Bookmarks">🔖</button>
  <button onclick="addBookmark()" title="Bookmark this page">＋🔖</button>
</div>

<div id="viewport"></div>

<div id="bm-panel">
  <div style="padding:12px 14px;border-bottom:1px solid #374151;display:flex;align-items:center;justify-content:space-between">
    <span style="font-size:14px;font-weight:600;color:#f9fafb">Bookmarks</span>
    <button onclick="clearBookmarks()" style="font-size:11px;color:#9ca3af;background:none;border:none;cursor:pointer">Clear all</button>
  </div>
  <div id="bm-list"><div id="bm-empty">No bookmarks yet. Press ＋🔖 to bookmark the current page.</div></div>
</div>

<script type="module">
// PDF Viewer — uses pdfjs-dist 4.x served from /pdfjs/
// Bookmarks + highlights saved to localStorage keyed by PDF URL.

const params = new URLSearchParams(location.search);
const pdfUrl = params.get('url');
const apiBase = ['localhost','127.0.0.1'].includes(location.hostname) ? 'http://127.0.0.1:7840' : 'https://api.lnker.com';

if (!pdfUrl) {
  document.getElementById('error-text').textContent = 'No PDF URL specified. Add ?url=https://...';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-msg').style.display = 'flex';
  throw new Error('no url');
}

// Title from URL slug
const slug = decodeURIComponent(pdfUrl.split('/').pop()).replace(/\.pdf$/i,'').replace(/[-_]/g,' ');
document.title = slug + ' — site2rag';
document.getElementById('title-label').textContent = slug;

// --- PDF.js setup ---
let pdfjsLib2, renderTextLayerFn;
try {
  const mod = await import('/pdfjs/pdf.mjs');
  pdfjsLib2 = mod;
  renderTextLayerFn = mod.renderTextLayer || null;
  pdfjsLib2.GlobalWorkerOptions.workerSrc = '/pdfjs/pdf.worker.mjs';
} catch(e) {
  showError('Failed to load PDF.js: ' + e.message);
  throw e;
}

const SCALE_STEP = 0.15;
let scale = 1.2;
let pdf = null;
let currentPage = 1;
let totalPages = 0;
let renderedPages = new Set();
let searchQuery = '';
let searchHits = []; // [{pageNo, idx, div}]
let hitCursor = -1;
let renderQueue = Promise.resolve();
const pageWrappers = new Map(); // pageNo -> wrapper element

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-msg').style.display = 'flex';
  document.getElementById('error-text').textContent = msg;
}

// --- Storage keys ---
const bmKey = () => 'bm:' + pdfUrl;
const hlKey = () => 'hl:' + pdfUrl;

// --- Load PDF ---
const proxyUrl = apiBase + '/api/pdf?url=' + encodeURIComponent(pdfUrl);
const loadingTask = pdfjsLib2.getDocument({ url: proxyUrl });
loadingTask.onProgress = ({ loaded, total }) => {
  if (total > 0) {
    const pct = Math.round(loaded / total * 100);
    document.getElementById('load-bar').style.width = pct + '%';
    document.getElementById('load-pct').textContent = pct + '%';
  }
};

try {
  pdf = await loadingTask.promise;
} catch(e) {
  showError('Could not load PDF: ' + e.message);
  throw e;
}

totalPages = pdf.numPages;
document.getElementById('loading').style.display = 'none';

// Update page info
function updatePageInfo() {
  document.getElementById('page-info').textContent = currentPage + ' / ' + totalPages;
  document.getElementById('btn-prev').disabled = currentPage <= 1;
  document.getElementById('btn-next').disabled = currentPage >= totalPages;
}

// Build page placeholder divs
const viewport2 = document.getElementById('viewport');
for (let i = 1; i <= totalPages; i++) {
  const wrapper = document.createElement('div');
  wrapper.className = 'pdf-page';
  wrapper.id = 'page-' + i;
  wrapper.style.minHeight = '300px';
  wrapper.style.minWidth = '200px';
  wrapper.dataset.page = i;
  viewport2.appendChild(wrapper);
  pageWrappers.set(i, wrapper);
}

// --- Intersection observer: render visible pages ---
const observer = new IntersectionObserver((entries) => {
  for (const entry of entries) {
    if (entry.isIntersecting) {
      const pg = parseInt(entry.target.dataset.page);
      if (!renderedPages.has(pg)) renderPage(pg);
    }
  }
}, { root: viewport2, rootMargin: '200px 0px' });

for (const [, w] of pageWrappers) observer.observe(w);

async function renderPage(pageNo) {
  if (renderedPages.has(pageNo)) return;
  renderedPages.add(pageNo);
  const wrapper = pageWrappers.get(pageNo);
  if (!wrapper) return;

  const page = await pdf.getPage(pageNo);
  const vp = page.getViewport({ scale });

  const canvas = document.createElement('canvas');
  canvas.width = vp.width;
  canvas.height = vp.height;
  canvas.style.width = vp.width + 'px';
  canvas.style.height = vp.height + 'px';

  const textDiv = document.createElement('div');
  textDiv.className = 'textLayer';
  textDiv.style.width = vp.width + 'px';
  textDiv.style.height = vp.height + 'px';

  wrapper.style.width = vp.width + 'px';
  wrapper.style.height = vp.height + 'px';
  wrapper.style.minHeight = '';
  wrapper.style.minWidth = '';
  wrapper.innerHTML = '';
  wrapper.appendChild(canvas);
  wrapper.appendChild(textDiv);

  const ctx = canvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport: vp }).promise;

  // Text layer
  const textContent = await page.getTextContent();
  if (renderTextLayerFn) {
    // pdfjs 4.x API
    renderTextLayerFn({ textContentSource: textContent, container: textDiv, viewport: vp });
  } else {
    // Fallback: manual span placement using Util.transform
    const Util = pdfjsLib2.Util;
    for (const item of textContent.items) {
      if (!item.str) continue;
      const span = document.createElement('span');
      span.textContent = item.str;
      const tx = Util.transform(vp.transform, item.transform);
      const angle = Math.atan2(tx[1], tx[0]);
      const fontSize = Math.sqrt(tx[2]*tx[2]+tx[3]*tx[3]);
      span.style.fontSize = fontSize + 'px';
      span.style.left = tx[4] + 'px';
      span.style.top = (tx[5] - fontSize) + 'px';
      if (angle !== 0) span.style.transform = `rotate(${-angle}rad)`;
      textDiv.appendChild(span);
    }
  }

  if (searchQuery) applyHighlights(wrapper, textDiv, pageNo);
}

// --- Navigation ---
window.prevPage = () => { if (currentPage > 1) scrollToPage(currentPage - 1); };
window.nextPage = () => { if (currentPage < totalPages) scrollToPage(currentPage + 1); };

function scrollToPage(n) {
  const wrapper = pageWrappers.get(n);
  if (!wrapper) return;
  currentPage = n;
  updatePageInfo();
  wrapper.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Track current page via scroll
viewport2.addEventListener('scroll', () => {
  for (const [n, w] of pageWrappers) {
    const rect = w.getBoundingClientRect();
    if (rect.top <= 100 && rect.bottom > 100) { currentPage = n; updatePageInfo(); break; }
  }
});

// --- Zoom ---
window.zoomIn = () => { scale = Math.min(3, scale + SCALE_STEP); rerender(); };
window.zoomOut = () => { scale = Math.max(0.3, scale - SCALE_STEP); rerender(); };
window.zoomFit = () => {
  const availW = viewport2.clientWidth - 24;
  // Estimate from first rendered page canvas
  const first = pageWrappers.get(1)?.querySelector('canvas');
  if (first) {
    const rendered = first.width;
    const currentScale = scale;
    const naturalW = rendered / currentScale;
    scale = Math.min(3, Math.max(0.3, availW / naturalW));
  }
  rerender();
};

function rerender() {
  renderedPages.clear();
  for (const [, w] of pageWrappers) { w.innerHTML = ''; w.style.minHeight = '300px'; }
  // Re-observe
  for (const [, w] of pageWrappers) observer.observe(w);
}

// Initial fit to viewport width
const firstPage = await pdf.getPage(1);
const firstVp = firstPage.getViewport({ scale: 1 });
const availW = viewport2.clientWidth - 24;
scale = Math.min(3, Math.max(0.5, availW / firstVp.width));

updatePageInfo();
// Trigger initial render via observer
setTimeout(() => {
  const entries = [];
  for (const [, w] of pageWrappers) {
    const rect = w.getBoundingClientRect();
    if (rect.top < window.innerHeight + 300) renderPage(parseInt(w.dataset.page));
  }
}, 100);

// --- Search ---
let searchDebounce;
window.onSearchInput = () => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(runSearch, 300);
};
window.onSearchKey = (e) => {
  if (e.key === 'Enter') { e.shiftKey ? prevHit() : nextHit(); }
  if (e.key === 'Escape') { document.getElementById('search-box').value = ''; runSearch(); }
};

async function runSearch() {
  searchQuery = document.getElementById('search-box').value.trim();
  // Clear old highlights
  for (const [, w] of pageWrappers) {
    w.querySelectorAll('.highlight').forEach(el => {
      el.classList.remove('highlight','selected');
    });
  }
  searchHits = [];
  hitCursor = -1;
  document.getElementById('search-count').textContent = '';
  document.getElementById('btn-prev-hit').disabled = true;
  document.getElementById('btn-next-hit').disabled = true;

  if (!searchQuery) return;

  // Search all pages (fetch text content for non-rendered pages too)
  for (let p = 1; p <= totalPages; p++) {
    const page = await pdf.getPage(p);
    const textContent = await page.getTextContent();
    const text = textContent.items.map(i => i.str).join(' ');
    if (text.toLowerCase().includes(searchQuery.toLowerCase())) {
      searchHits.push({ pageNo: p });
    }
  }

  document.getElementById('search-count').textContent =
    searchHits.length ? searchHits.length + ' match' + (searchHits.length > 1 ? 'es' : '') : 'No matches';
  document.getElementById('btn-prev-hit').disabled = searchHits.length === 0;
  document.getElementById('btn-next-hit').disabled = searchHits.length === 0;

  // Apply highlights on rendered pages
  for (const [n, w] of pageWrappers) {
    const textDiv = w.querySelector('.textLayer');
    if (textDiv) applyHighlights(w, textDiv, n);
  }

  if (searchHits.length) { hitCursor = 0; gotoHit(0); }
}

function applyHighlights(wrapper, textDiv, pageNo) {
  if (!searchQuery) return;
  const q = searchQuery.toLowerCase();
  for (const span of textDiv.querySelectorAll('span')) {
    if (span.textContent.toLowerCase().includes(q)) {
      span.classList.add('highlight');
    }
  }
}

window.prevHit = () => { if (searchHits.length) { hitCursor = (hitCursor - 1 + searchHits.length) % searchHits.length; gotoHit(hitCursor); } };
window.nextHit = () => { if (searchHits.length) { hitCursor = (hitCursor + 1) % searchHits.length; gotoHit(hitCursor); } };

async function gotoHit(idx) {
  const hit = searchHits[idx];
  if (!hit) return;
  scrollToPage(hit.pageNo);
  // Wait for render then select
  await new Promise(r => setTimeout(r, 400));
  const wrapper = pageWrappers.get(hit.pageNo);
  if (!wrapper) return;
  const spans = wrapper.querySelectorAll('.textLayer .highlight');
  wrapper.querySelectorAll('.highlight.selected').forEach(el => el.classList.remove('selected'));
  if (spans.length) { spans[0].classList.add('selected'); spans[0].scrollIntoView({ block: 'center' }); }
}

// --- Bookmarks ---
function getBookmarks() {
  try { return JSON.parse(localStorage.getItem(bmKey()) || '[]'); } catch { return []; }
}
function saveBookmarks(bms) {
  localStorage.setItem(bmKey(), JSON.stringify(bms));
}

window.addBookmark = () => {
  const bms = getBookmarks();
  if (bms.find(b => b.page === currentPage)) return;
  bms.push({ page: currentPage, label: 'Page ' + currentPage, ts: Date.now() });
  bms.sort((a,b) => a.page - b.page);
  saveBookmarks(bms);
  renderBookmarks();
};

window.clearBookmarks = () => { saveBookmarks([]); renderBookmarks(); };

window.toggleBookmarks = () => {
  document.getElementById('bm-panel').classList.toggle('open');
};

function renderBookmarks() {
  const bms = getBookmarks();
  const list = document.getElementById('bm-list');
  if (!bms.length) {
    list.innerHTML = '<div id="bm-empty">No bookmarks yet. Press ＋🔖 to bookmark the current page.</div>';
    return;
  }
  list.innerHTML = bms.map((b,i) => `
    <div class="bm-item" onclick="scrollToPage(${b.page})">
      <span>📄</span>
      <span style="flex:1">${b.label}</span>
      <span class="bm-page">p.${b.page}</span>
      <span class="bm-del" onclick="event.stopPropagation();deleteBookmark(${i})">×</span>
    </div>`).join('');
}

window.deleteBookmark = (idx) => {
  const bms = getBookmarks();
  bms.splice(idx, 1);
  saveBookmarks(bms);
  renderBookmarks();
};

renderBookmarks();

// --- Keyboard shortcuts ---
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevPage();
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
  if (e.key === '+' || e.key === '=') zoomIn();
  if (e.key === '-') zoomOut();
  if (e.key === 'f' || e.key === 'F') { document.getElementById('search-box').focus(); e.preventDefault(); }
  if (e.key === 'b' || e.key === 'B') addBookmark();
});

// Make scrollToPage available globally (called from bookmark items)
window.scrollToPage = scrollToPage;
</script>
</body>
</html>
